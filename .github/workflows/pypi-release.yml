name: PyPI Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: linuxdospace-pypi-release
  cancel-in-progress: false

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      package_name: ${{ steps.package-metadata.outputs.package_name }}
      package_version: ${{ steps.package-metadata.outputs.package_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Read package metadata
        id: package-metadata
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          project = data["project"]
          print(f"package_name={project['name']}")
          print(f"package_version={project['version']}")
          PY

      - name: Validate release tag version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.package-metadata.outputs.package_version }}
          GIT_TAG: ${{ github.ref_name }}
        run: |
          expected_tag="v${PACKAGE_VERSION}"
          if [ "$GIT_TAG" != "$expected_tag" ]; then
            echo "::error::Git tag ${GIT_TAG} does not match package version ${PACKAGE_VERSION}. Expected ${expected_tag}."
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        shell: bash
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish To PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/LinuxDoSpace/

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
